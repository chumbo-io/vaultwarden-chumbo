<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 270" role="img" aria-label="chumbo.io logo">
  <title>chumbo.io</title>

  <!-- ── ICONO: NUEVO diseño sin mordisco ──────────── -->
  <svg x="0" y="0" width="200" height="270" viewBox="0 0 200 270">
    <defs>
      <clipPath id="body-clip">
        <!-- Forma más ovalada y vertical característica del higo chumbo -->
        <ellipse cx="100" cy="130" rx="48" ry="80"/>
      </clipPath>
    </defs>

    <!-- Cuerpo principal del chumbo - forma ovalada vertical -->
    <ellipse cx="100" cy="130" rx="48" ry="80" fill="#9B1D35"/>

    <!-- Textura de aréolas características del chumbo (más distribuidas) -->
    <g fill="#7A1528" clip-path="url(#body-clip)">
      <circle cx="70"  cy="85"  r="2.5"/>
      <circle cx="90"  cy="75"  r="2.5"/>
      <circle cx="110" cy="80"  r="2.5"/>
      <circle cx="130" cy="95"  r="2.5"/>
      <circle cx="65"  cy="110" r="2.5"/>
      <circle cx="85"  cy="100" r="2.5"/>
      <circle cx="105" cy="105" r="2.5"/>
      <circle cx="125" cy="120" r="2.5"/>
      <circle cx="60"  cy="135" r="2.5"/>
      <circle cx="80"  cy="125" r="2.5"/>
      <circle cx="100" cy="130" r="2.5"/>
      <circle cx="120" cy="135" r="2.5"/>
      <circle cx="65"  cy="160" r="2.5"/>
      <circle cx="85"  cy="155" r="2.5"/>
      <circle cx="105" cy="160" r="2.5"/>
      <circle cx="125" cy="165" r="2.5"/>
      <circle cx="70"  cy="185" r="2.5"/>
      <circle cx="90"  cy="180" r="2.5"/>
      <circle cx="110" cy="185" r="2.5"/>
      <circle cx="130" cy="190" r="2.5"/>
    </g>

    <!-- Corona floral en la parte superior (característica única del higo chumbo) -->
    <g fill="#9B1D35">
      <!-- Pétalos de la corona -->
      <ellipse cx="88" cy="52" rx="6" ry="10" transform="rotate(-25 88 52)"/>
      <ellipse cx="100" cy="48" rx="6" ry="12"/>
      <ellipse cx="112" cy="52" rx="6" ry="10" transform="rotate(25 112 52)"/>
      <!-- Detalles adicionales de la corona -->
      <circle cx="94" cy="57" r="3"/>
      <circle cx="106" cy="57" r="3"/>
    </g>

    <!-- Detalle decorativo naranja en la corona -->
    <g fill="#F4A523" opacity="0.7">
      <circle cx="100" cy="53" r="2.5"/>
      <circle cx="94" cy="58" r="1.5"/>
      <circle cx="106" cy="58" r="1.5"/>
    </g>
  </svg>

  <!-- ── WORDMARK ───────────────────────────────────────── -->
  <text
    x="228" y="148"
    dominant-baseline="middle"
    font-family="'Space Grotesk', 'Plus Jakarta Sans', Inter, system-ui, -apple-system, sans-serif"
    font-size="90"
  >
    <tspan font-weight="700" fill="#9B1D35">chumbo</tspan><tspan font-weight="300" fill="#F4A523">.io</tspan>
  </text>
</svg>

