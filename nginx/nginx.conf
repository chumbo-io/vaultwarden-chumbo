worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 512;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  access_log    /dev/stdout;

  # Buffer para sub_filter (necesario para inyectar en <head>)
  proxy_buffer_size         128k;
  proxy_buffers             4 256k;
  proxy_busy_buffers_size   256k;

  # ── Redirigir HTTP → HTTPS ────────────────────────────────
  server {
    listen 8080;
    return 301 https://$host:8443$request_uri;
  }

  # ── HTTPS con certificado mkcert ──────────────────────────
  server {
    listen 8443 ssl;

    ssl_certificate     /etc/nginx/certs/vault.crt;
    ssl_certificate_key /etc/nginx/certs/vault.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Archivos estáticos de branding chumbo ─────────────────
    location = /chumbo-theme.css {
      root /etc/nginx/chumbo-static;
      add_header Cache-Control "public, max-age=86400";
    }

    location = /chumbo-logo.svg {
      root /etc/nginx/chumbo-static;
      add_header Cache-Control "public, max-age=86400";
    }

    # ── Proxy general a Vaultwarden ───────────────────────────
    location / {
      # "vaultwarden" = nombre del servicio en docker-compose / Railway private network
      # Vaultwarden escucha en puerto 80 por defecto (imagen oficial Docker)
      proxy_pass         http://vaultwarden:80;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;

      # Inyectar tema chumbo en todas las páginas HTML
      sub_filter_once off;
      sub_filter_types text/html;
      sub_filter '</head>'
        '<link rel="stylesheet" href="/chumbo-theme.css"><title>chumbo Vault</title></head>';

      # También reemplazar el title por defecto
      sub_filter '<title>Bitwarden Web Vault</title>' '<title>chumbo Vault</title>';
      sub_filter '<title>Vaultwarden Web</title>'     '<title>chumbo Vault</title>';
    }

    # ── WebSocket para notificaciones (Vaultwarden /notifications) ──
    location /notifications/hub {
      proxy_pass         http://vaultwarden:3012;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "Upgrade";
      proxy_set_header   Host       $host;
    }
  }
}
